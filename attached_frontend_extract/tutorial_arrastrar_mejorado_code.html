<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tutorial Interactivo - Paso A</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2c1b4b",
                        "accent-purple": "#a855f7",
                        "background-light": "#f7f6f8",
                        "background-dark": "#18141e",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 selection:bg-primary/30">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- TopAppBar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-primary/10">
<div class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined text-3xl">close</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Tutorial: Paso A</h2>
</div>
<main class="flex-1 flex flex-col max-w-2xl mx-auto w-full">
<!-- Escena de la Mesa de Catedral -->
<div class="@container px-4 py-4">
<div class="relative w-full aspect-[4/3] bg-center bg-no-repeat bg-cover flex flex-col justify-center items-center overflow-hidden rounded-xl border-4 border-primary/20 shadow-2xl bg-slate-800" data-alt="Ancient stone cathedral table with flickering candles and deep shadows" style='background-image: linear-gradient(to bottom, rgba(24, 20, 30, 0.6), rgba(24, 20, 30, 0.9)), url("https://lh3.googleusercontent.com/aida-public/AB6AXuB5BOY1EoxXD9o6_qubYcwaFTqPT5yHRm797E8awQgW1U3sTTqRMMPgZUswBkR-CrsaGL7RzRAcNkUtx5TDZYTEnaLYAUVww7Y-AyeVHy9ClBQUHM4va-GgZzUGk77GKjTckVoc_joT4v9xFDXKJppMcGk2HQgq0cXS8LKqHN-VEv28GhvLahIlVkcUqHhM3vKM2YIubGdEqMT6krnCXWHonqWlAVTz02EGJW1epJhM1zoCO1E8taYGP0bXdh9YurZgRi69dHrPvSs");'>
<!-- Pila de Descarte Central -->
<div class="relative z-10 flex flex-col items-center">
<div class="w-32 h-48 bg-primary/40 rounded-lg border-2 border-primary/60 flex flex-col items-center justify-center shadow-lg transform -rotate-3 transition-transform hover:scale-105" style="background-image: linear-gradient(135deg, rgba(44,27,75,0.8) 0%, rgba(24,20,30,1) 100%);">
<span class="material-symbols-outlined text-red-600 text-5xl mb-2">water_drop</span>
<span class="text-white text-2xl font-bold">7</span>
<span class="text-primary/40 absolute inset-0 flex items-center justify-center text-8xl pointer-events-none opacity-20">7</span>
</div>
<p class="mt-4 text-accent-purple font-bold tracking-widest text-sm uppercase bg-black/40 px-3 py-1 rounded-full backdrop-blur-sm">Pila de Descarte</p>
</div>
<!-- Efecto de Humo Ambiental (Simulado con gradientes) -->
<div class="absolute inset-0 pointer-events-none opacity-40 mix-blend-screen bg-gradient-to-t from-primary/20 via-transparent to-transparent"></div>
<!-- Dedo Fantasmagórico (Icono representativo) -->
<div class="absolute bottom-20 right-1/4 z-30 flex flex-col items-center opacity-80">
<span class="material-symbols-outlined text-white text-6xl drop-shadow-[0_0_10px_rgba(168,85,247,0.8)]">pan_tool_alt</span>
<div class="h-24 w-1 bg-gradient-to-t from-accent-purple/0 to-accent-purple/60 -mt-2"></div>
</div>
</div>
</div>
<!-- Instrucciones -->
<div class="px-4 text-center">
<h3 class="text-slate-900 dark:text-white tracking-light text-2xl font-extrabold leading-tight pb-2 pt-4">¡Tu turno! Arrastra para jugar</h3>
<p class="text-primary dark:text-accent-purple text-lg font-medium leading-normal pb-6">Coincide con el palo o el rango</p>
</div>
<!-- Mano del Jugador -->
<div class="p-4 @container bg-primary/5 dark:bg-primary/20 rounded-t-3xl border-t border-primary/30">
<div class="flex justify-center gap-4 py-8">
<!-- Carta Inválida 1 -->
<div class="w-24 h-36 bg-slate-700 rounded-lg border border-white/10 flex flex-col items-center justify-center opacity-70 grayscale shadow-md transform -rotate-6">
<span class="material-symbols-outlined text-slate-400 text-3xl">ac_unit</span>
<span class="text-slate-400 text-xl font-bold">3</span>
</div>
<!-- Carta Válida (Brillo Púrpura) -->
<div class="relative group cursor-pointer">
<!-- Aura/Efecto de Humo Púrpura -->
<div class="absolute inset-0 bg-accent-purple/40 blur-2xl rounded-lg animate-pulse"></div>
<div class="relative w-28 h-40 bg-primary rounded-lg border-2 border-accent-purple flex flex-col items-center justify-center shadow-[0_0_20px_rgba(168,85,247,0.5)] transform scale-110 z-20 transition-all hover:-translate-y-4">
<span class="material-symbols-outlined text-red-500 text-4xl mb-1">water_drop</span>
<span class="text-white text-2xl font-bold">K</span>
<div class="absolute bottom-2 right-2 opacity-20">
<span class="material-symbols-outlined text-2xl">water_drop</span>
</div>
</div>
</div>
<!-- Carta Inválida 2 -->
<div class="w-24 h-36 bg-slate-700 rounded-lg border border-white/10 flex flex-col items-center justify-center opacity-70 grayscale shadow-md transform rotate-6">
<span class="material-symbols-outlined text-slate-400 text-3xl">local_fire_department</span>
<span class="text-slate-400 text-xl font-bold">5</span>
</div>
</div>
</div>
<!-- Info Detallada -->
<div class="p-4">
<div class="flex flex-col items-stretch justify-start rounded-xl bg-primary/10 dark:bg-white/5 border border-primary/20 p-4">
<div class="flex items-center gap-4">
<div class="w-16 h-16 bg-accent-purple/20 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-accent-purple text-3xl">help_outline</span>
</div>
<div class="flex flex-col">
<p class="text-slate-900 dark:text-white text-lg font-bold leading-tight">¿Cómo jugar?</p>
<p class="text-slate-600 dark:text-slate-400 text-sm">Arrastra la carta brillante hacia el centro para realizar tu movimiento.</p>
</div>
</div>
</div>
</div>
</main>
<!-- Espaciador Inferior -->
<div class="h-8"></div>
</div>
</body></html>
