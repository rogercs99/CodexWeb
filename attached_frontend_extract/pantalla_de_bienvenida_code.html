<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ECLIPSE CLUB - Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2c1b4b",
                        "accent-gold": "#b8860b",
                        "background-light": "#f7f6f8",
                        "background-dark": "#0a080e",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .gothic-gradient {
            background: radial-gradient(circle at center, rgba(44, 27, 75, 0.4) 0%, rgba(10, 8, 14, 1) 100%);
        }
        .velvet-button {
            background: linear-gradient(135deg, #442a71 0%, #2c1b4b 100%);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(184, 134, 11, 0.3);
        }
        .sigil-overlay {
            mask-image: linear-gradient(to bottom, transparent, black, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black, transparent);
            opacity: 0.15;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden">
<div class="relative flex h-screen w-full flex-col items-center justify-between overflow-hidden bg-background-dark">
<!-- Background Elements -->
<div class="absolute inset-0 z-0 overflow-hidden">
<!-- Volumetric Fog Effect -->
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/asfalt-dark.png')] opacity-20"></div>
<div class="absolute inset-0 gothic-gradient"></div>
<!-- Occult Sigils Background -->
<div class="absolute inset-0 flex items-center justify-center sigil-overlay pointer-events-none" data-alt="Subtle golden occult sigils and sacred geometry patterns">
<span class="material-symbols-outlined text-[400px] text-accent-gold rotate-45">auto_graph</span>
</div>
<!-- Animated-like Fog Layers -->
<div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-background-dark to-transparent"></div>
</div>
<!-- Header -->
<div class="relative z-10 flex w-full items-center justify-between p-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-accent-gold text-3xl">brightness_4</span>
<h2 class="text-slate-100 text-xl font-extrabold tracking-[0.2em] uppercase">Eclipse Club</h2>
</div>
<button class="text-accent-gold/70 hover:text-accent-gold transition-colors">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
<!-- Hero Content -->
<div class="relative z-10 flex flex-col items-center px-6 text-center">
<div class="mb-8 relative">
<div class="absolute inset-0 blur-3xl bg-primary/40 rounded-full"></div>
<div class="relative w-48 h-48 border-2 border-accent-gold/20 rounded-full flex items-center justify-center bg-primary/10 backdrop-blur-sm shadow-[0_0_50px_rgba(44,27,75,0.5)]" data-alt="Mystical moon eclipse with golden corona">
<span class="material-symbols-outlined text-8xl text-accent-gold drop-shadow-[0_0_15px_rgba(184,134,11,0.5)]">brightness_empty</span>
</div>
</div>
<h1 class="text-slate-100 tracking-tight text-4xl font-extrabold leading-tight mb-2 drop-shadow-md">Aprende jugando.</h1>
<p class="text-accent-gold text-2xl font-bold tracking-widest uppercase opacity-90">90 segundos.</p>
<p class="text-slate-400 mt-4 max-w-xs leading-relaxed">Domina el conocimiento arcano en sesiones rápidas de alta intensidad.</p>
</div>
<!-- CTAs -->
<div class="relative z-10 w-full max-w-md px-8 pb-12 flex flex-col gap-4">
<button class="velvet-button w-full py-5 rounded-xl flex items-center justify-center gap-3 group overflow-hidden relative">
<div class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-accent-gold text-2xl group-hover:scale-110 transition-transform">play_circle</span>
<span class="text-slate-100 text-lg font-bold tracking-wide uppercase">Iniciar Tutorial</span>
</button>
<button class="w-full py-3 rounded-lg flex items-center justify-center text-slate-500 hover:text-slate-300 transition-colors font-medium">
<span>Omitir (hacer más tarde)</span>
<span class="material-symbols-outlined text-sm ml-1">chevron_right</span>
</button>
</div>
<!-- Footer Decoration -->
<div class="absolute bottom-0 w-full h-1 bg-gradient-to-r from-transparent via-accent-gold/40 to-transparent"></div>
</div>
<!-- Bottom Navigation Component (Modified for Welcome State) -->
<div class="fixed bottom-0 w-full z-20">
<div class="flex gap-2 border-t border-primary/30 bg-background-dark/80 backdrop-blur-lg px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-accent-gold" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined fill-1">home</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-600" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">swords</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-600" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-600" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">person</span>
</div>
</a>
</div>
</div>
</body></html>
